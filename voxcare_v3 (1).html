<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VoxCare — Smart Hospital Handover</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.1.0/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Comfortaa',sans-serif}
:root{
  --bg:#fdf6f0;--card:#ffffff;--card2:#fef9f6;--border:#f0ddd5;
  --peach:#f4845f;--peach-light:#fde8df;--peach-mid:#f9c4b0;
  --pink:#e87fa0;--pink-light:#fce8f0;
  --lavender:#b07ec8;--lav-light:#f0e6f8;
  --green:#3eb489;--green-light:#e0f5ed;
  --amber:#e8a030;--amber-light:#fdf0dc;
  --red:#e05555;--red-light:#fdeaea;
  --blue:#2d7dd2;--blue-light:#ddeeff;
  --text:#2d1f1a;--sub:#7a5c52;--muted:#b09080;
  --shadow:0 2px 8px rgba(180,100,70,.08),0 8px 24px rgba(180,100,70,.06);
  --shadow-hover:0 12px 40px rgba(180,100,70,.18),0 2px 8px rgba(180,100,70,.10)
}
body{background:var(--bg);min-height:100vh;display:flex;flex-direction:column}

@keyframes pulse-ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(2);opacity:0}100%{transform:scale(2);opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes slide-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}40%{transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes logo-blink{0%,90%,100%{opacity:1}94%,96%{opacity:0.15}}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes float-in{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pop-in{0%{opacity:0;transform:scale(.88) translateY(10px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes live-pulse{0%,100%{box-shadow:0 0 0 0 rgba(62,180,137,.4)}70%{box-shadow:0 0 0 8px rgba(62,180,137,0)}}
.beat{animation:beat 1.3s ease infinite}

/* ── CARD POP (no tilt) ── */
.card{
  background:var(--card);border:1.5px solid var(--border);border-radius:18px;
  padding:18px;box-shadow:var(--shadow);margin-bottom:14px;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease, border-color .28s ease;
  will-change:transform;position:relative;
}
.card:hover{
  transform:translateY(-6px) scale(1.018);
  box-shadow:var(--shadow-hover);
  border-color:var(--peach-mid)
}
.card:last-child{margin-bottom:0}
.card-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.card-title i{font-size:15px}

/* ── LOGIN ── */
#login-screen{display:flex;align-items:center;justify-content:center;flex:1;padding:24px;animation:fade-in .4s ease}
.login-wrap{width:100%;max-width:440px}
.login-brand{text-align:center;margin-bottom:32px}
.login-logo-mark{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;animation:float 2.8s ease-in-out infinite, logo-blink 4s ease-in-out infinite;filter:drop-shadow(0 10px 28px rgba(232,127,160,.45))}
.login-logo-mark img{width:80px;height:80px;object-fit:cover;border-radius:50%}
.login-brand h1{font-size:30px;font-weight:700;color:var(--text)}
.login-brand h1 em{color:var(--peach);font-style:normal}
.login-brand p{font-size:13px;color:var(--sub);margin-top:5px}
.portal-pick{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.portal-btn{
  padding:22px 16px;border-radius:18px;border:2px solid var(--border);
  background:var(--card);cursor:pointer;text-align:center;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .28s ease, border-color .2s, background .2s
}
.portal-btn:hover{border-color:var(--peach-mid);background:var(--peach-light);transform:translateY(-4px) scale(1.03);box-shadow:0 10px 28px rgba(244,132,95,.18)}
.portal-btn.selected{border-color:var(--peach);background:var(--peach-light);transform:translateY(-4px) scale(1.03);box-shadow:0 10px 28px rgba(244,132,95,.22)}
.portal-btn i{font-size:28px;display:block;margin-bottom:8px}
.portal-btn .pb-label{font-size:13px;font-weight:700;color:var(--text)}
.portal-btn .pb-sub{font-size:11px;color:var(--sub);margin-top:3px}
.login-form{background:var(--card);border-radius:22px;padding:28px;border:1.5px solid var(--border);box-shadow:var(--shadow)}
.login-form h2{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid var(--border);background:var(--card2);font-size:13px;color:var(--text);outline:none;transition:all .18s;font-family:'Comfortaa',sans-serif}
.form-group input:focus{border-color:var(--peach);box-shadow:0 0 0 3px rgba(244,132,95,.12)}
.login-btn{width:100%;padding:14px;border-radius:13px;background:linear-gradient(135deg,#f4845f,#e87fa0);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;font-family:'Comfortaa',sans-serif}
.login-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 8px 24px rgba(244,132,95,.38)}
.login-error{display:none;background:var(--red-light);border:1.5px solid #f5b8b8;border-radius:9px;padding:10px 14px;font-size:12px;color:var(--red);margin-bottom:14px;font-weight:700}
.login-error.on{display:block}

/* ── SHIFT POPUP ── */
.shift-popup-overlay{display:none;position:fixed;inset:0;background:rgba(45,31,26,.45);z-index:999;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fade-in .25s ease}
.shift-popup-overlay.on{display:flex}
.shift-popup{background:#fff;border-radius:24px;padding:28px;max-width:500px;width:calc(100% - 40px);box-shadow:0 24px 80px rgba(45,31,26,.22);animation:pop-in .35s cubic-bezier(.34,1.56,.64,1)}
.shift-popup-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.shift-popup-icon{width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#f4845f,#e87fa0);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.shift-popup-icon i{font-size:22px;color:#fff}
.shift-popup h2{font-size:18px;font-weight:700;color:var(--text)}
.shift-popup p{font-size:13px;color:var(--sub);margin-top:3px}
.shift-priority-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;max-height:300px;overflow-y:auto}
.shift-item{border-radius:12px;padding:12px 14px;border-left:3px solid transparent}
.shift-item.critical{background:var(--red-light);border-left-color:var(--red)}
.shift-item.moderate{background:var(--amber-light);border-left-color:var(--amber)}
.shift-item.stable{background:var(--green-light);border-left-color:var(--green)}
.shift-item-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.shift-item-note{font-size:12px;color:var(--sub);line-height:1.5}
.shift-popup-close{width:100%;padding:13px;border-radius:12px;background:linear-gradient(135deg,#f4845f,#e87fa0);color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:'Comfortaa',sans-serif;transition:all .2s}
.shift-popup-close:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(244,132,95,.35)}

/* ── APP SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh}
#app.on{display:flex;animation:fade-in .3s ease}
.app-nav{background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 20px;height:58px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(180,100,70,.06)}
.nav-logo{display:flex;align-items:center;gap:9px;margin-right:22px;flex-shrink:0}
.nav-logo-mark{width:34px;height:34px;border-radius:11px;background:linear-gradient(135deg,#f4845f,#e87fa0);display:flex;align-items:center;justify-content:center}
.nav-logo-mark i{font-size:17px;color:#fff}
.nav-logo-text{font-size:17px;font-weight:700;color:var(--text)}
.nav-logo-text em{color:var(--peach);font-style:normal}
.nav-tabs{display:flex;gap:2px;flex:1;overflow-x:auto}
.nav-tab{display:flex;align-items:center;gap:5px;padding:7px 13px;border-radius:10px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer;border:none;background:none;transition:all .18s;white-space:nowrap;flex-shrink:0;font-family:'Comfortaa',sans-serif}
.nav-tab:hover{color:var(--sub);background:var(--peach-light)}
.nav-tab.on{color:var(--peach);background:var(--peach-light)}
.nav-badge{width:7px;height:7px;border-radius:50%;background:var(--red);animation:blink 1.1s infinite;flex-shrink:0}
.nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-left:10px}
.shift-tag{background:var(--green-light);color:var(--green);font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px;display:flex;align-items:center;gap:5px}
.portal-tag{font-size:11px;font-weight:700;padding:5px 11px;border-radius:20px}
.nurse-tag{background:var(--peach-light);color:var(--peach)}
.doctor-tag{background:var(--blue-light);color:var(--blue)}
.nav-av{width:34px;height:34px;border-radius:50%;border:2px solid var(--peach-mid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--peach);background:var(--peach-light)}
.logout-btn{padding:6px 13px;border-radius:9px;border:1.5px solid var(--border);background:none;font-size:12px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .18s;font-family:'Comfortaa',sans-serif}
.logout-btn:hover{background:var(--red-light);color:var(--red);border-color:#f5b8b8}
.app-body{flex:1;padding:20px;max-width:1100px;width:100%;margin:0 auto}

/* ── PANES ── */
.pane{display:none}
.pane.on{display:block;animation:float-in .3s ease}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}

/* ── STATS ── */
.stat-val{font-size:34px;font-weight:700;letter-spacing:-.5px;line-height:1}
.stat-desc{font-size:12px;color:var(--sub);margin-top:5px;line-height:1.5}
.stat-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:3px 9px;border-radius:8px;margin-top:8px}

/* ── PIE ── */
.pie-wrap{display:flex;align-items:center;gap:18px}
.pie-legend{display:flex;flex-direction:column;gap:9px;flex:1}
.pie-leg-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--sub)}
.pie-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.pie-leg-val{font-weight:700;color:var(--text);margin-left:auto}

/* ── PATIENT LIST ── */
.pat-row{display:flex;align-items:center;gap:12px;padding:12px 6px;border-bottom:1.5px solid #fdf0ea;transition:all .2s cubic-bezier(.34,1.56,.64,1);border-radius:10px}
.pat-row:last-of-type{border:none}
.pat-row:hover{background:var(--peach-light);transform:translateY(-2px) scale(1.008);box-shadow:0 4px 16px rgba(244,132,95,.1)}
.pat-av{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.pat-name{font-size:13px;font-weight:700;color:var(--text)}
.pat-info{font-size:11px;color:var(--sub);margin-top:2px}
.pat-badge{padding:4px 10px;border-radius:8px;font-size:10px;font-weight:700;flex-shrink:0}
.risk-high{background:var(--red-light);color:var(--red)}
.risk-med{background:var(--amber-light);color:var(--amber)}
.risk-low{background:var(--green-light);color:var(--green)}
.pat-expand-btn{margin-left:8px;padding:5px 11px;border-radius:9px;border:1.5px solid var(--border);background:none;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .18s;flex-shrink:0;font-family:'Comfortaa',sans-serif}
.pat-expand-btn:hover{background:var(--peach-light);color:var(--peach);border-color:var(--peach-mid)}
.pat-detail{display:none;background:var(--card2);border-radius:13px;padding:14px;margin:6px;border:1.5px solid var(--border)}
.pat-detail.on{display:block;animation:slide-up .2s ease}

/* ── VITALS ── */
.vital-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.vital-box{
  background:var(--card2);border:1.5px solid var(--border);border-radius:13px;padding:12px;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease
}
.vital-box:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 8px 22px rgba(180,100,70,.12);border-color:var(--peach-mid)}
.vital-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em}
.vital-num{font-size:22px;font-weight:700;letter-spacing:-.3px}
.vital-unit{font-size:10px;color:var(--muted);font-weight:400;margin-left:2px}
.vital-bar{height:4px;background:#f0ddd5;border-radius:2px;margin-top:8px;overflow:hidden}
.vital-fill{height:100%;border-radius:2px;transition:width .7s ease}
.vital-live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:6px;vertical-align:middle;animation:live-pulse 1.5s infinite}

/* ── ALERTS ── */
.alert-row{
  display:flex;align-items:flex-start;gap:12px;padding:12px 8px;border-bottom:1.5px solid #fdf0ea;
  border-radius:10px;transition:all .2s
}
.alert-row:hover{background:var(--peach-light);transform:translateY(-2px)}
.alert-row:last-child{border:none}
.alert-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.alert-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.alert-desc{font-size:12px;color:var(--sub);line-height:1.5}
.alert-time{font-size:10px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:4px}
.alert-dot{width:5px;height:5px;border-radius:50%;background:var(--red);animation:blink 1s infinite}
.dismiss-btn{background:var(--peach-light);border:1.5px solid var(--border);border-radius:9px;padding:5px 12px;font-size:11px;font-weight:700;color:var(--peach);cursor:pointer;flex-shrink:0;transition:all .18s;font-family:'Comfortaa',sans-serif}
.dismiss-btn:hover{background:var(--peach);color:#fff;border-color:var(--peach)}

/* ── MIC ── */
.mic-zone{text-align:center;padding:10px 0}
.mic-wrap{position:relative;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.mic-ring{position:absolute;width:86px;height:86px;border-radius:50%;border:2.5px solid var(--peach);opacity:0}
.mic-ring.on{animation:pulse-ring 1.5s ease-out infinite}
.mic-ring.r2.on{animation:pulse-ring 1.5s ease-out .5s infinite}
.mic-btn{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,#f4845f,#e87fa0);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;transition:transform .15s;box-shadow:0 6px 20px rgba(244,132,95,.35)}
.mic-btn:hover{transform:scale(1.1) translateY(-2px)}
.mic-btn.rec{background:linear-gradient(135deg,#e05555,#c0404f);box-shadow:0 6px 20px rgba(224,85,85,.4)}
.mic-btn i{font-size:28px;color:#fff}
.wvf{display:flex;align-items:center;justify-content:center;gap:3px;height:32px;margin:8px 0 14px}
.wvf-b{width:3px;border-radius:2px;background:var(--peach-mid);transition:all .1s}
.wvf-b.on{background:var(--peach)}
.rec-lbl{font-size:13px;color:var(--sub);margin-bottom:4px;font-weight:600}
.rec-time{font-size:36px;font-weight:700;color:var(--text);letter-spacing:2px;font-variant-numeric:tabular-nums;margin-bottom:16px}
.tag-row{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:18px}
.vtag{padding:6px 13px;border-radius:9px;font-size:11px;font-weight:700;background:var(--peach-light);color:var(--sub);cursor:pointer;border:1.5px solid transparent;transition:all .18s;font-family:'Comfortaa',sans-serif}
.vtag:hover{border-color:var(--peach-mid);transform:translateY(-1px) scale(1.04)}
.vtag.on{color:var(--peach);border-color:var(--peach);background:#fde8df}
.submit-btn{background:linear-gradient(135deg,#f4845f,#e87fa0);color:#fff;border:none;border-radius:13px;padding:13px 36px;font-size:13px;font-weight:700;cursor:pointer;transition:all .22s cubic-bezier(.34,1.56,.64,1);font-family:'Comfortaa',sans-serif;box-shadow:0 4px 14px rgba(244,132,95,.3)}
.submit-btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 8px 24px rgba(244,132,95,.4)}
.submit-btn:disabled{background:#e8d0c8;color:#b09080;cursor:not-allowed;transform:none;box-shadow:none}

/* ── LIVE TRANSCRIPT ── */
.transcript-box{background:var(--card2);border:1.5px solid var(--border);border-radius:13px;padding:14px;margin:12px 0;min-height:70px;text-align:left;font-size:13px;color:var(--text);line-height:1.7;display:none;position:relative}
.transcript-box.on{display:block;animation:slide-up .2s ease}
.transcript-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.interim-text{color:var(--muted);font-style:italic}
.final-text{color:var(--text)}
.toast{display:none;align-items:center;gap:8px;background:var(--green-light);border:1.5px solid #a8e0cb;border-radius:11px;padding:12px 16px;margin-top:14px;font-size:12px;color:var(--green);font-weight:700}
.toast.on{display:flex;animation:slide-up .3s ease}

/* ── AI ANALYSIS BOX ── */
.ai-box{border-radius:13px;padding:14px;margin-top:14px;display:none;border:1.5px solid var(--lavender);background:var(--lav-light)}
.ai-box.on{display:block;animation:slide-up .3s ease}
.ai-box-header{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--lavender);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.ai-body{font-size:13px;color:var(--sub);line-height:1.7}
.ai-risk-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700;margin-bottom:8px}
.ai-thinking{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);padding:8px 0}
.ai-thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--lavender);animation:blink .8s infinite}
.ai-thinking-dot:nth-child(2){animation-delay:.25s}
.ai-thinking-dot:nth-child(3){animation-delay:.5s}

/* ── PATIENT NOTIFICATION CARD (sent after handover) ── */
.patient-notify-box{background:linear-gradient(135deg,#e0f5ed,#f0e6f8);border:1.5px solid #a8e0cb;border-radius:13px;padding:14px;margin-top:10px;display:none}
.patient-notify-box.on{display:block;animation:slide-up .3s ease}
.patient-notify-header{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;color:var(--green);margin-bottom:8px}
.patient-notify-msg{font-size:12px;color:var(--sub);line-height:1.6}

/* ── LOG ── */
.log-entry{
  background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1), box-shadow .2s ease
}
.log-entry:hover{transform:translateY(-4px) scale(1.008);box-shadow:0 8px 24px rgba(180,100,70,.12);border-color:var(--peach-mid)}
.log-entry.new-entry{border-color:var(--peach);background:var(--peach-light)}
.log-entry.critical-entry{border-color:var(--red);background:var(--red-light)}
.log-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.log-name{font-size:13px;font-weight:700;color:var(--text)}
.log-meta{font-size:11px;color:var(--muted);text-align:right}
.log-shift-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;margin-top:3px}
.log-body{font-size:12px;color:var(--sub);line-height:1.6}
.log-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.log-tag{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--peach-light);color:var(--peach)}
.log-ai-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;background:var(--lav-light);color:var(--lavender);display:flex;align-items:center;gap:4px}

/* ── DOCTOR PANES ── */
.doc-patient-row{display:flex;align-items:flex-start;gap:12px;padding:14px 8px;border-bottom:1.5px solid #fdf0ea;border-radius:10px;transition:all .2s}
.doc-patient-row:hover{background:var(--peach-light);transform:translateY(-2px)}
.doc-patient-row:last-child{border:none}
.doc-pat-main{flex:1}
.doc-pat-name{font-size:14px;font-weight:700;color:var(--text)}
.doc-pat-meta{font-size:12px;color:var(--sub);margin-top:2px}
.doc-pat-nurse{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px}
.doc-pat-status{font-size:12px;color:var(--sub);margin-top:8px;line-height:1.55;border-radius:9px;padding:9px 12px;border-left:3px solid var(--peach-mid);background:var(--card2)}
.doc-pat-status.urgent{border-left-color:var(--red);background:var(--red-light)}
.doc-pat-status.moderate{border-left-color:var(--amber);background:var(--amber-light)}
.doc-pat-status.good{border-left-color:var(--green);background:var(--green-light)}
.doc-note-btn{padding:7px 14px;border-radius:9px;border:1.5px solid var(--border);background:none;font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;font-family:'Comfortaa',sans-serif}
.doc-note-btn:hover{background:var(--blue-light);color:var(--blue);border-color:var(--blue)}
.doc-note-btn.done{background:var(--green-light);color:var(--green);border-color:#a8e0cb}
.info-box{font-size:12px;color:var(--sub);padding:12px 14px;background:var(--peach-light);border-radius:11px;line-height:1.6;margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
.info-box i{font-size:16px;color:var(--peach);flex-shrink:0;margin-top:1px}

/* ── LIVE CLOCK ── */
.live-clock{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}

@media(max-width:640px){
  .row2,.row3{grid-template-columns:1fr}
  .nav-tab span{display:none}
  .app-body{padding:12px}
}
</style>
</head>

/* ═══════════════ LIVE CLOCK ═══════════════ */
function startClock(){
  clearInterval(clockInterval);
  function tick(){
    const now=new Date();
    const s=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    const el=document.getElementById('live-clock');if(el)el.textContent=s;
  }
  tick();clockInterval=setInterval(tick,1000);
}

/* ═══════════════ SHIFT POPUP ═══════════════ */
function showShiftPopup(isNurse){
  const criticals=patients.filter(p=>p.risk==='high');
  const mods=patients.filter(p=>p.risk==='med');
  const stables=patients.filter(p=>p.risk==='low');

  const shiftName=isNurse?'Morning Shift':'Morning Rounds';
  document.getElementById('shift-popup-title').textContent=`Good morning! ${shiftName} briefing`;
  document.getElementById('shift-popup-sub').textContent=
    `${criticals.length} critical · ${mods.length} need watching · ${stables.length} stable`;

  const list=document.getElementById('shift-priority-list');
  const items=[
    ...criticals.map(p=>`<div class="shift-item critical">
      <div class="shift-item-name">🔴 ${p.name} · ${p.bed} · ${p.ward}</div>
      <div class="shift-item-note">${p.handovers[p.handovers.length-1].note}</div>
    </div>`),
    ...mods.map(p=>`<div class="shift-item moderate">
      <div class="shift-item-name">🟡 ${p.name} · ${p.bed}</div>
      <div class="shift-item-note">${p.handovers[p.handovers.length-1].note}</div>
    </div>`),
    ...stables.map(p=>`<div class="shift-item stable">
      <div class="shift-item-name">🟢 ${p.name} · ${p.bed}</div>
      <div class="shift-item-note">${p.handovers[p.handovers.length-1].note}</div>
    </div>`)
  ];
  list.innerHTML=items.join('');
  document.getElementById('shift-popup').classList.add('on');
}
function closeShiftPopup(){
  document.getElementById('shift-popup').classList.remove('on');
}

  }
}

function doLogin(){
  const u=document.getElementById('login-user').value.trim();
  const pw=document.getElementById('login-pass').value.trim();
  const err=document.getElementById('login-error');
  err.classList.remove('on');
  if(!u||!pw){
    err.textContent='Please enter your username and password.';
    err.classList.add('on');return;
  }
  const list=CREDENTIALS[currentPortal]||[];
  const match=list.find(c=>c.username.toLowerCase()===u.toLowerCase()&&c.password===pw);
  if(!match){
    err.textContent='Invalid username or password. Please try again.';
    err.classList.add('on');return;
  }
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('on');
  buildApp(currentPortal,match.username);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&document.getElementById('login-screen').style.display!=='none')doLogin();
});
// Show initial hint

function doLogout(){
  document.getElementById('app').classList.remove('on');
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-user').value='';
  document.getElementById('login-pass').value='';
  clearInterval(vitalInterval);clearInterval(clockInterval);
  stopRec();
}

function buildApp(portal,username){
  loggedUser=username||'Nurse';
  const isNurse=portal==='nurse';
  document.getElementById('portal-tag').textContent=isNurse?'Nurse Portal':'Doctor Portal';
  document.getElementById('portal-tag').className='portal-tag '+(isNurse?'nurse-tag':'doctor-tag');
  document.getElementById('nav-av').textContent=loggedUser.substring(0,2).toUpperCase();
  document.getElementById('shift-label').textContent=isNurse?'Night shift · Ward B':'Morning rounds';
  startClock();

  const tabs=isNurse?[
    {id:'dash',icon:'ti-layout-dashboard',label:'Dashboard'},
    {id:'patients',icon:'ti-users',label:'Patients'},
    {id:'record',icon:'ti-microphone',label:'Record Handover'},
    {id:'alerts',icon:'ti-bell',label:'Alerts',badge:true},
    {id:'log',icon:'ti-file-text',label:'Handover Log'},
  ]:[
    {id:'ddash',icon:'ti-layout-dashboard',label:'Dashboard'},
    {id:'dpatients',icon:'ti-users',label:'My Patients'},
    {id:'dalerts',icon:'ti-bell',label:'Alerts',badge:true},
  ];

  document.getElementById('nav-tabs').innerHTML=tabs.map((t,i)=>`
    <button class="nav-tab${i===0?' on':''}" onclick="goTab('${t.id}',this)">
      <i class="ti ${t.icon}"></i><span>${t.label}</span>${t.badge?'<div class="nav-badge" id="nav-dot"></div>':''}
    </button>`).join('');

  document.getElementById('app-body').innerHTML=isNurse?buildNurse():buildDoctor();
  setTimeout(()=>{
    if(isNurse){
      renderNursePatients();renderAlerts('alert-list');renderHandoverLog();buildWvf();
      drawPie('pie1',[{v:3,c:'#e05555'},{v:8,c:'#e8a030'},{v:13,c:'#3eb489'}]);
      drawPie('pie2',[{v:18,c:'#f4845f'},{v:4,c:'#f9c4b0'},{v:2,c:'#f0ddd5'}]);
      startVitals();
    } else {
      renderDoctorPatients();renderAlerts('d-alert-list');
      drawPie('dpie1',[{v:3,c:'#e05555'},{v:8,c:'#e8a030'},{v:13,c:'#3eb489'}]);
    }
    updateCounts();
  },80);
  setTimeout(()=>showShiftPopup(isNurse),600);
}

function goTab(id,el){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));

}

/* ═══════════════ HANDOVER LOG RENDER ═══════════════ */
function renderHandoverLog(){
  const el=document.getElementById('log-list');if(!el)return;
  const base=patients.flatMap(p=>p.handovers.map(h=>({...h,patient:p.name,bed:p.bed,ward:p.ward,isNew:false})));
  const all=[...savedHandovers.map(h=>({...h,isNew:true})),...base];
  el.innerHTML=all.map(h=>`
    <div class="log-entry${h.isNew?' new-entry':''}${h.aiRisk==='CRITICAL'?' critical-entry':''}">
      <div class="log-header">
        <div>
          <div class="log-name">${h.patient||'General'} · ${h.bed||'—'}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${h.ward||''} &nbsp; <span class="pat-badge risk-${h.risk||'low'}" style="display:inline-block;padding:1px 7px;font-size:10px">${h.risk==='high'?'Critical':h.risk==='med'?'Needs watch':'Doing well'}</span></div>
        </div>
        <div class="log-meta">${h.time}<br><span class="log-shift-badge" style="${h.shift==='Night Shift'||h.shift==='Recorded'?'background:var(--lav-light);color:var(--lavender)':'background:var(--amber-light);color:var(--amber)'}">${h.shift}</span></div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Logged by: <strong style="color:var(--sub)">${h.by}</strong>${h.isNew?' <span style="background:var(--peach-light);color:var(--peach);padding:1px 7px;border-radius:5px;font-size:10px;font-weight:700;margin-left:4px">NEW</span>':''}</div>
      <div class="log-body">${h.note}</div>
      ${h.aiNote?`<div style="margin-top:10px;padding:9px 12px;background:var(--lav-light);border-radius:9px;border-left:3px solid var(--lavender)"><div style="font-size:10px;font-weight:700;color:var(--lavender);margin-bottom:4px;display:flex;align-items:center;gap:5px"><i class="ti ti-brain" style="font-size:12px"></i> AI Analysis · ${h.aiRisk}</div><div style="font-size:12px;color:var(--sub)">${h.aiNote}</div></div>`:''}
      <div class="log-tags" style="margin-top:8px">${(h.tags||[]).map(t=>`<span class="log-tag">${t}</span>`).join('')}</div>
    </div>`).join('');
}

/* ═══════════════ CHARTS ═══════════════ */
function drawPie(id,slices){
  const c=document.getElementById(id);if(!c)return;
  const ctx=c.getContext('2d');const cx=55,cy=55,r=44,inner=26;
  let angle=-Math.PI/2;const total=slices.reduce((a,s)=>a+s.v,0);
  slices.forEach(s=>{const sw=(s.v/total)*Math.PI*2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,angle,angle+sw);ctx.closePath();ctx.fillStyle=s.c;ctx.fill();angle+=sw;});
  ctx.beginPath();ctx.arc(cx,cy,inner,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
  ctx.fillStyle='#2d1f1a';ctx.font='700 14px Comfortaa,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(total,cx,cy-5);
  ctx.fillStyle='#b09080';ctx.font='500 9px Comfortaa,sans-serif';ctx.fillText('total',cx,cy+7);
}

/* ═══════════════ LIVE VITALS ═══════════════ */
function startVitals(){
  clearInterval(vitalInterval);
  vitalInterval=setInterval(()=>{
    const hr=90+Math.round(Math.random()*18);
    const sp=91+Math.round(Math.random()*6);
    const tmp=(37.6+Math.random()*1.4).toFixed(1);
    const sys=135+Math.round(Math.random()*12);
    const dia=85+Math.round(Math.random()*8);
    const hEl=document.getElementById('v-hr');
    if(hEl){hEl.innerHTML=hr+'<span class="vital-unit">bpm</span>';hEl.style.color=hr>108?'#e05555':hr>98?'#e8a030':'#3eb489';}
    const sEl=document.getElementById('v-spo');
    if(sEl){sEl.innerHTML=sp+'<span class="vital-unit">%</span>';sEl.style.color=sp<93?'#e05555':sp<96?'#e8a030':'#2d7dd2';}
    const bEl=document.getElementById('v-bp');
    if(bEl){bEl.innerHTML=sys+'<span class="vital-unit">/'+dia+'</span>';bEl.style.color=sys>145?'#e05555':sys>135?'#e8a030':'#b07ec8';}
    const tEl=document.getElementById('v-tmp');
    if(tEl){tEl.innerHTML=tmp+'<span class="vital-unit">°C</span>';tEl.style.color=parseFloat(tmp)>39?'#e05555':parseFloat(tmp)>38?'#e8a030':'#3eb489';}
    const hb=document.getElementById('v-hr-b');if(hb)hb.style.width=Math.round(hr/1.4)+'%';
    const sb=document.getElementById('v-spo-b');if(sb)sb.style.width=sp+'%';
  },2400);
}

/* ═══════════════ VOICE RECORDING ═══════════════ */
let rec=false,timer=null,secs=0,wt=null,recognition=null;
let finalTranscript='',interimTranscript='';

function buildWvf(){
  const w=document.getElementById('wvf');if(!w)return;
  w.innerHTML='';
  for(let i=0;i<26;i++){const b=document.createElement('div');b.className='wvf-b';b.style.height=(Math.random()*20+6)+'px';w.appendChild(b);}
}

function showSpeechStatus(msg){
  const s=document.getElementById('speech-status');if(!s)return;
  if(msg){s.textContent=msg;s.style.display='block';}else{s.style.display='none';}
}

function toggleRec(){if(!rec)startRec();else stopRec();}

function startRec(){
  rec=true;finalTranscript='';interimTranscript='';
  const btn=document.getElementById('mic-btn');
  const ico=document.getElementById('mic-ico');
  const lbl=document.getElementById('rec-lbl');
  if(btn)btn.classList.add('rec');
  if(ico)ico.className='ti ti-square';
  if(lbl){lbl.textContent='Recording… tap to stop';lbl.style.color='#e05555';}
  const r1=document.getElementById('r1'),r2=document.getElementById('r2');
  if(r1)r1.classList.add('on');if(r2)r2.classList.add('on');
  // hide ai box when starting new
  const ab=document.getElementById('ai-box');if(ab)ab.classList.remove('on');
  secs=0;
  timer=setInterval(()=>{
    secs++;
    const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');
    const rt=document.getElementById('rec-time');if(rt)rt.textContent=m+':'+s;
    // Enable save button after 3 seconds of recording regardless of transcript
    if(secs>=3){const sub=document.getElementById('sub-btn');if(sub)sub.disabled=false;}
  },1000);
  wt=setInterval(()=>{
    document.querySelectorAll('.wvf-b').forEach(b=>{b.classList.toggle('on',Math.random()>.4);b.style.height=(Math.random()*22+5)+'px';});
  },110);

  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(SR){
    recognition=new SR();
    recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-IN';
    recognition.onstart=()=>showSpeechStatus('🎙 Microphone is on — speak now');
    recognition.onresult=e=>{
      let interim='';
      for(let i=e.resultIndex;i<e.results.length;i++){
        if(e.results[i].isFinal) finalTranscript+=e.results[i][0].transcript+' ';
        else interim+=e.results[i][0].transcript;
      }
      interimTranscript=interim;
      updateLiveTranscript();
    };
    recognition.onerror=e=>{
      if(e.error==='not-allowed')showSpeechStatus('⚠ Microphone blocked. Please allow mic and try again.');
      else if(e.error==='no-speech')showSpeechStatus('No speech detected — try speaking louder');
      else showSpeechStatus('Speech error: '+e.error);
    };
    recognition.onend=()=>{if(rec)recognition.start();};
    recognition.start();
  } else {
    showSpeechStatus('⚠ Your browser does not support voice input. Use Chrome for best results.');
  }
}

function updateLiveTranscript(){
  const box=document.getElementById('transcript-box');
  const ft=document.getElementById('transcript-final');
  const it=document.getElementById('transcript-interim');
  if(!box||!ft||!it)return;
  box.classList.add('on');
  ft.textContent=finalTranscript||'';
  it.textContent=interimTranscript||'';
  // enable save once we have some transcript
  const sub=document.getElementById('sub-btn');
  if(sub&&finalTranscript.trim().length>10)sub.disabled=false;
}

function stopRec(){
  if(!rec&&!recognition)return;
  rec=false;
  if(recognition){recognition.onend=null;recognition.stop();recognition=null;}
  clearInterval(timer);clearInterval(wt);
  document.querySelectorAll('.wvf-b').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('mic-btn'),ico=document.getElementById('mic-ico'),lbl=document.getElementById('rec-lbl');
  if(btn)btn.classList.remove('rec');
  if(ico)ico.className='ti ti-microphone';
  if(lbl){lbl.textContent=finalTranscript.trim()?'Done! Review and save below.':'Recording done — tap Save to log this handover.';lbl.style.color=finalTranscript.trim()?'#3eb489':'#e8a030';}
  const r1=document.getElementById('r1'),r2=document.getElementById('r2');
  if(r1)r1.classList.remove('on');if(r2)r2.classList.remove('on');
  showSpeechStatus('');
  interimTranscript='';
  const it=document.getElementById('transcript-interim');if(it)it.textContent='';
  // Always enable save after stopping — allow saving even without transcript text
  const sub=document.getElementById('sub-btn');if(sub&&secs>0)sub.disabled=false;
  // Run AI analysis if we have transcript
  if(finalTranscript.trim().length>10) runAIAnalysis(finalTranscript.trim());
}

/* ═══════════════ AI ANALYSIS (Claude API) ═══════════════ */
async function runAIAnalysis(transcriptText){
  const aiBox=document.getElementById('ai-box');
  const aiContent=document.getElementById('ai-content');
  if(!aiBox||!aiContent)return;

  aiBox.classList.add('on');
  aiContent.innerHTML=`<div class="ai-thinking"><div class="ai-thinking-dot"></div><div class="ai-thinking-dot"></div><div class="ai-thinking-dot"></div><span style="margin-left:4px">Analysing handover…</span></div>`;

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1000,
        system:`You are a clinical AI assistant for a hospital handover system in India. Analyse nurse handover notes and return ONLY a valid JSON object with these exact fields:
{
  "riskLevel": "CRITICAL" | "MODERATE" | "STABLE",
  "riskColor": "#e05555" | "#e8a030" | "#3eb489",
  "riskBg": "#fdeaea" | "#fdf0dc" | "#e0f5ed",
  "summary": "2-3 sentence clinical summary of what happened",
  "immediateActions": ["action 1", "action 2"],
  "watchFor": ["sign to watch for"],
  "patientMessage": "A simple, kind 1-2 sentence message for the patient or their family explaining what was done during this shift in plain language (no medical jargon)",
  "tags": ["tag1","tag2"]
}
Be accurate. If oxygen is mentioned dropping, mark CRITICAL. If pain, missed meds, blood sugar — MODERATE. Return ONLY the JSON, no markdown, no explanation.`,
        messages:[{role:'user',content:`Nurse handover note: "${transcriptText}"\n\nAnalyse this and return JSON only.`}]
      })
    });

    const data=await response.json();
    let text=(data.content||[]).map(i=>i.text||'').join('');
    // Strip any accidental markdown
    text=text.replace(/```json|```/g,'').trim();
    let result;
    try{result=JSON.parse(text);}catch(e){
      // fallback if JSON parse fails
      result={
        riskLevel:'MODERATE',riskColor:'#e8a030',riskBg:'#fdf0dc',
        summary:text.substring(0,200),immediateActions:['Review patient status'],watchFor:['Monitor vitals'],
        patientMessage:'The nurse has completed their shift notes for your care.',tags:['Handover']
      };
    }
    renderAIResult(result,transcriptText);
  }catch(err){
    aiContent.innerHTML=`<div style="font-size:12px;color:var(--muted)">AI analysis unavailable. Your handover note has been saved as-is.</div>`;
    const sub=document.getElementById('sub-btn');if(sub)sub.disabled=false;
  }
}

function renderAIResult(r,originalNote){
  const aiContent=document.getElementById('ai-content');if(!aiContent)return;
  const riskLabel=r.riskLevel==='CRITICAL'?'🔴 CRITICAL':r.riskLevel==='MODERATE'?'🟡 MODERATE':'🟢 STABLE';
  aiContent.innerHTML=`
    <div class="ai-risk-badge" style="background:${r.riskBg};color:${r.riskColor}">${riskLabel}</div>
    <div class="ai-body">
      <div style="margin-bottom:10px">${r.summary}</div>
      ${r.immediateActions&&r.immediateActions.length?`
      <div style="font-size:10px;font-weight:700;color:var(--lavender);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Immediate actions</div>
      <ul style="padding-left:16px;margin-bottom:10px">${r.immediateActions.map(a=>`<li style="font-size:12px;color:var(--sub);margin-bottom:3px">${a}</li>`).join('')}</ul>`:''}
      ${r.watchFor&&r.watchFor.length?`
      <div style="font-size:10px;font-weight:700;color:var(--lavender);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px">Watch for</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">${r.watchFor.map(w=>`<span style="background:var(--lav-light);color:var(--lavender);padding:3px 9px;border-radius:7px;font-size:11px;font-weight:700">${w}</span>`).join('')}</div>`:''}
    </div>`;

  // Store result for saving
  window._lastAIResult={...r,originalNote};
  // show patient notification preview
  showPatientNotify(r.patientMessage);
  const sub=document.getElementById('sub-btn');if(sub)sub.disabled=false;
}

function showPatientNotify(msg){
  const card=document.getElementById('patient-notify-card');
  const msgEl=document.getElementById('patient-notify-msg');
  if(!card||!msgEl)return;
  card.style.display='block';
  msgEl.innerHTML=`<strong style="color:var(--text);display:block;margin-bottom:4px">Message to patient record</strong>${msg||'Nurse handover completed. Care team updated.'}`;
}

/* ═══════════════ SUBMIT HANDOVER ═══════════════ */
function submitRec(){
  const now=new Date();
  const timeStr=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  const tags=[...document.querySelectorAll('.vtag.on')].map(t=>t.textContent.trim());
  const note=finalTranscript.trim()||`(Voice handover recorded — ${String(Math.floor(secs/60)).padStart(2,'0')}:${String(secs%60).padStart(2,'0')} duration)`;
  const ai=window._lastAIResult||{};

  const entry={
    patient:'Ward B · General',bed:'—',ward:'Ward B',
    risk: ai.riskLevel==='CRITICAL'?'high': ai.riskLevel==='MODERATE'?'med':'low',
    shift:'Recorded',by:loggedUser,time:timeStr,note,tags,
    aiRisk:ai.riskLevel||null,
    aiNote:ai.summary||null,
    isNew:true
  };
  savedHandovers.unshift(entry);

  // update handover count
  const dc=document.getElementById('d-handover-count');if(dc)dc.textContent=18+savedHandovers.length;

  // update session log panel
  updateSessionLog();

  // show toast
  const t=document.getElementById('rec-toast');
  if(t){t.classList.add('on');setTimeout(()=>t.classList.remove('on'),5000);}

  // reset recording state
  finalTranscript='';interimTranscript='';
  const sub=document.getElementById('sub-btn');if(sub)sub.disabled=true;
  const rt=document.getElementById('rec-time');if(rt)rt.textContent='00:00';
  const lbl=document.getElementById('rec-lbl');if(lbl){lbl.textContent='Tap to start recording';lbl.style.color='';}
  const tb=document.getElementById('transcript-box');if(tb)tb.classList.remove('on');
  const ab=document.getElementById('ai-box');if(ab)ab.classList.remove('on');
  const ft=document.getElementById('transcript-final');if(ft)ft.textContent='';
  const it=document.getElementById('transcript-interim');if(it)it.textContent='';
  window._lastAIResult=null;

  // if critical, add to alerts
  if(entry.risk==='high'){
    alertData.unshift({
      ico:'ti-alert-triangle',ic:'#e05555',ib:'#fdeaea',
      title:`Critical handover — ${entry.by} · ${timeStr}`,
      desc:note.substring(0,100)+(note.length>100?'…':''),
      time:'Just now',live:true
    });
    updateCounts();
    renderAlerts('alert-list');
  }
}

function updateSessionLog(){
  const el=document.getElementById('session-log');if(!el)return;
  const sc=document.getElementById('session-count');if(sc)sc.textContent=savedHandovers.length;
  el.innerHTML=savedHandovers.map(h=>`
    <div style="padding:10px 12px;border-radius:10px;border-left:3px solid ${h.risk==='high'?'var(--red)':h.risk==='med'?'var(--amber)':'var(--green)'};background:${h.risk==='high'?'var(--red-light)':h.risk==='med'?'var(--amber-light)':'var(--green-light)'};margin-bottom:8px">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:3px">${h.time} · by ${h.by}</div>
      <div style="font-size:12px;color:var(--sub);line-height:1.5">${h.note.substring(0,120)}${h.note.length>120?'…':''}</div>
      ${h.aiRisk?`<div style="font-size:10px;font-weight:700;color:var(--lavender);margin-top:5px;display:flex;align-items:center;gap:4px"><i class="ti ti-brain" style="font-size:11px"></i> AI: ${h.aiRisk}</div>`:''}
    </div>`).join('');
}
